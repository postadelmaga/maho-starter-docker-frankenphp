[mysqld]
# Charset
character-set-server = utf8mb4
collation-server     = utf8mb4_unicode_ci

# Engine
default-storage-engine = InnoDB
innodb_file_per_table  = 1

# Connessioni
max_connections        = 150
wait_timeout           = 300
interactive_timeout    = 300

# Buffer & performance
innodb_buffer_pool_size   = 256M   # adatta alla RAM disponibile
innodb_log_file_size      = 64M
tmp_table_size            = 64M
max_heap_table_size       = 64M
query_cache_type          = 0      # deprecato in MariaDB recenti, tienilo a 0

# Log slow queries (utile in dev)
slow_query_log         = 1
slow_query_log_file    = /var/lib/mysql/slow.log
long_query_time        = 2

[client]
default-character-set = utf8mb4
